upstream leads_backend {
    server leads:8000;
}
upstream research_backend {
    server research:8000;
}
upstream outreach_backend {
    server outreach:8000;
}

server {
    listen 80;
    server_name localhost;

    location /api/leads/ {
        proxy_pass http://leads_backend/api/leads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/research/ {
        proxy_pass http://research_backend/api/research/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/outreach/ {
        proxy_pass http://outreach_backend/api/outreach/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
